---
# Cross-version test matrix declarations.
#
# Format: top-level keys are ecosystem names. Each ecosystem defines:
#   lang_versions:  list of "language" versions to install (e.g. PHP, Node)
#   tool_versions:  list of "tool" versions to install (e.g. composer, npm)
#   cells:          list of {lang, tool} pairs to actually test
#                   (cross-product if omitted; explicit if you want a subset)
#   bats_file:      bats file(s) to run for this ecosystem's tests
#
# To add an ecosystem (e.g. npm × node): add a new top-level entry, drop a
# matching switcher script at switchers/<ecosystem>.sh, and add install
# logic to install-versions.yml. The driver (run.sh) takes an ecosystem
# name and walks its cells.

composer:
  lang_versions: ["8.1", "8.2", "8.3"]
  tool_versions: ["1.10", "2.7", "2.8", "2.9"]
  # No explicit `cells:` block → full cross-product (3 × 4 = 12 cells).
  bats_files:
    - tests/bats/11-composer-adversarial.bats
    - tests/bats/16-composer-behavioral.bats
    - tests/bats/28-composer-tier-rendering.bats

# pnpm 10 reads ~/.config/pnpm/rc (ini); pnpm 11+ only reads
# ~/.config/pnpm/config.yaml (YAML). The role deploys both files but each
# version only honors one of them — this matrix proves both code paths
# work against the real binaries instead of just template assumptions.
# Node 20 and 22 are the current LTS line; pnpm 10 works on both, pnpm 11
# requires Node >= 22.13 (uses node:sqlite). The (20, 11) combination is
# physically invalid per pnpm 11's engine constraint — excluded below.
pnpm:
  lang_versions: ["20", "22"]
  tool_versions: ["10", "11"]
  # 2 × 2 = 4 nominal cells, minus 1 excluded = 3 cells.
  excludes:
    - { lang: "20", tool: "11" }  # pnpm 11 requires Node >= 22.13
  bats_files:
    - tests/bats/13-pnpm-adversarial.bats

# pip lang axis is intentionally degenerate ("system"): the distro axis
# in run-docker.sh already covers different pythons (Ubuntu 22.04 ships
# 3.10, Ubuntu 24.04 ships 3.12, Debian 12 ships 3.11). Installing
# multiple pythons per cell would duplicate that. tool axis pins specific
# pip versions to verify the role's wrapper survives across pip's recent
# patch lines.
pip:
  lang_versions: ["system"]
  tool_versions: ["bundled", "23.3.2", "24.3.1", "25.0.1"]
  # 1 × 4 = 4 cells per distro.
  bats_files:
    - tests/bats/22-pip-wrapper-safety.bats

# uv ships fast and has had meaningful behavioral changes recently
# (cache layout, --exclude-newer semantics, exit codes). The cross-distro
# axis exercises different pythons; the tool axis exercises three uv
# minor versions. bats coverage is via the pip-wrapper tests since they
# exercise the pip→uv redirect that the role installs.
uv:
  lang_versions: ["system"]
  tool_versions: ["0.4.30", "0.5.7", "0.6.0"]
  # 1 × 3 = 3 cells per distro. Patch versions pinned for reproducibility;
  # bump in install-versions.yml when needed.
  bats_files:
    - tests/bats/22-pip-wrapper-safety.bats

# Deno's CLI surface has changed between 1.x and 2.x (subcommand allowlist,
# flag handling, exit codes). The role's tasks/deno.yml deploys an in-place
# wrapper at the discovered deno location that injects --minimum-dependency-age
# into fetching subcommands. The wrapper needs to work across both major
# versions — matrix covers the last 1.x and two 2.x patches.
deno:
  lang_versions: ["system"]
  tool_versions: ["1.46.3", "2.0.6", "2.1.4"]
  # 1 × 3 = 3 cells per distro.
  bats_files:
    - tests/bats/24-deno-path-wrapper.bats

# npm: less version-sensitive in the role's code than pnpm (no version-keyed
# config file split), but still high-traffic enough to verify the role's
# /usr/local/bin/npm wrapper works across Node majors and a couple of npm
# patch lines. "bundled" uses whatever npm ships with the Node tarball
# (npm 10.x with Node 20, npm 10.x with Node 22 at time of writing).
npm:
  lang_versions: ["20", "22"]
  tool_versions: ["bundled", "11"]
  # 2 × 2 = 4 cells per distro.
  bats_files:
    - tests/bats/08-npm-adversarial.bats
    - tests/bats/23-npm-path-wrapper.bats

# Bun is fast-moving but config surface is small (just .bunfig.toml).
# Matrix covers three minor lines across the 1.x stable era.
bun:
  lang_versions: ["system"]
  tool_versions: ["1.0.30", "1.1.20", "1.2.0"]
  # 1 × 3 = 3 cells per distro.
  bats_files:
    - tests/bats/15-bun-adversarial.bats

# Yarn: the role only supports Yarn Berry (2.x+) — Yarn Classic (1.x)
# uses a different config format that the role doesn't deploy. Two
# major lines of Berry (3.x stable, 4.x current) × the same Node
# tarballs used for pnpm. Bats tests (14-yarn-adversarial.bats) now
# write packageManager dynamically based on whichever yarn is
# corepack-active, so cells actually exercise the matrix's yarn
# version (previously the tests pinned yarn@4.9.1 which made matrix
# coverage tautological — corepack would download 4.9.1 regardless
# of switcher).
yarn:
  lang_versions: ["20", "22"]
  tool_versions: ["3.6.4", "4.5.3"]
  # 2 × 2 = 4 cells per distro.
  bats_files:
    - tests/bats/14-yarn-adversarial.bats

# Bundler: ruby axis intentionally degenerate ("system") — each distro
# ships a different ruby version (Ubuntu 22.04→3.0, Ubuntu 24.04→3.2,
# Debian 12→3.1), so cross-distro IS the ruby axis. Installing rbenv
# /ruby-build per cell would multiply the install time significantly
# for marginal value (role's bundler task is just .bundle/config
# deployment; version-stable). tool axis is bundler version — "bundled"
# uses what apt's ruby-bundler provides.
bundler:
  lang_versions: ["system"]
  tool_versions: ["bundled"]
  # 1 × 1 = 1 cell per distro (smoke test — 3 cells cross-distro).
  bats_files:
    - tests/bats/17-bundler-behavioral.bats

# Maven: the role's tasks/maven.yml deploys ~/.m2/settings.xml with an
# HTTPS-only mirror and strict checksum policy. Config is version-stable
# across maven 3.x; matrix coverage is mostly smoke ("does deployed
# config remain valid as mvn versions change"). Java 17 (current LTS),
# maven "bundled" (apt) + 3.9.9 (download).
maven:
  lang_versions: ["17"]
  tool_versions: ["bundled", "3.9.9"]
  # 1 × 2 = 2 cells per distro.
  bats_files:
    - tests/bats/29-maven-behavioral.bats

# Gradle: tasks/gradle.yml deploys an init script
# (~/.gradle/init.d/supply-chain-security.gradle) that rejects HTTP
# repos. Same shape as maven — config is version-stable, matrix is
# smoke coverage. Java 17 reused from maven.
gradle:
  lang_versions: ["17"]
  tool_versions: ["bundled", "8.5"]
  # 1 × 2 = 2 cells per distro.
  bats_files:
    - tests/bats/30-gradle-behavioral.bats

# NuGet/.NET: tasks/nuget.yml deploys ~/.nuget/NuGet/NuGet.Config with
# nuget.org-only package source allowlist and required-signature
# enforcement. .NET SDK 8.0 LTS installed via dotnet-install.sh
# (cross-distro). v1 nuget matrix is a single-cell smoke test — the
# matrix's value here is mostly "does the role's nuget task work on
# every supported distro" (cross-distro axis). SDK-version-specific
# matrix coverage would need multiple .NET SDKs side-by-side and a
# switcher that pins via global.json; deferred.
nuget:
  lang_versions: ["system"]
  tool_versions: ["bundled"]
  # 1 × 1 = 1 cell per distro (3 cross-distro).
  bats_files:
    - tests/bats/31-nuget-behavioral.bats

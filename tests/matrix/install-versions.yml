---
# Install all PHP + composer versions side-by-side on the matrix host.
#
# Idempotent: safe to re-run. Each version is installed to a deterministic
# path so the per-cell switcher can pick the right one without ambiguity.
#
# Layout after a successful run:
#   /usr/bin/php8.1, /usr/bin/php8.2, /usr/bin/php8.3      (from Sury)
#   /usr/local/bin/composer-1.10.phar                       (pinned patch)
#   /usr/local/bin/composer-2.7.phar
#   /usr/local/bin/composer-2.8.phar
#   /usr/local/bin/composer-2.9.phar
#
# Sury repo (https://packages.sury.org/php/) is the canonical source for
# side-by-side PHP on Debian/Ubuntu and is used in production by enough
# of the PHP world that it's the only practical choice for a matrix host.
#
# Composer phars are downloaded from getcomposer.org with SHA-256 checksums
# fetched from getcomposer.org itself (composer.phar.sha256sum). Pinning
# patch versions per minor line gives reproducibility — running the matrix
# in May 2026 vs August 2026 tests the same composer binary. To roll
# forward, bump the `patch` field for any minor below (the checksum is
# refetched automatically; no maintenance burden in this playbook).
# Note: composer publishes .sha256sum, not .sha384sum — the latter URL
# returns 404 for every version. SHA-256 is fine here: the threat model
# is binary tampering on getcomposer.org (which serves over HTTPS+HSTS),
# and SHA-256 collisions remain computationally infeasible.

- name: Install matrix PHP + composer versions
  hosts: all
  become: true
  vars:
    matrix_php_versions: ["8.1", "8.2", "8.3"]
    matrix_composer_versions:
      # Last 1.x release line. 1.10.27 is the final 1.x security release
      # per composer's release notes (1.x EOL October 2022, security-only
      # patches since).
      - { minor: "1.10", patch: "1.10.27" }
      # Last 2.7.x. Bump if composer publishes a newer 2.7 patch.
      - { minor: "2.7", patch: "2.7.9" }
      # Last 2.8.x. Bump if composer publishes a newer 2.8 patch.
      - { minor: "2.8", patch: "2.8.12" }
      # Latest stable at time of writing. Bump as composer releases.
      - { minor: "2.9", patch: "2.9.8" }

  tasks:
    # --- Driver prereqs ---
    # The matrix driver (tests/matrix/run.sh) needs bats, jq, and pyyaml.
    # pyyaml is a transitive dep of ansible already (ansible-playbook
    # won't run without it), but install explicitly so a missing/removed
    # python3-yaml fails loud at this layer rather than midway through
    # the driver. All three packages are in apt main on every supported
    # distro (Ubuntu 22.04, Ubuntu 24.04, Debian 12). No yq needed —
    # python3 + pyyaml + jq covers everything the driver does.
    - name: Install matrix driver prereqs (bats, jq, python3-yaml, python3-pip)
      # python3-pip is needed by switchers/pip.sh — without it,
      # `python3 -m pip install` fails with "No module named pip" and
      # every pip cell's switcher exits nonzero. Was missing in the
      # original install-versions.yml; matrix runs caught it because all
      # 4 pip cells × 3 distros uniformly failed at <switcher> step.
      ansible.builtin.apt:
        name: [bats, jq, python3-yaml, python3-pip]
        state: present
        update_cache: true

    # --- PHP (via Sury) ---
    - name: Install prereqs for adding the Sury PHP repository
      ansible.builtin.apt:
        name: [ca-certificates, apt-transport-https, lsb-release, gnupg, curl, software-properties-common]
        state: present
        update_cache: true

    - name: Add Sury PHP repository signing key
      ansible.builtin.get_url:
        url: https://packages.sury.org/php/apt.gpg
        dest: /usr/share/keyrings/sury-php.gpg
        mode: "0644"

    - name: Add Sury PHP apt source
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/sury-php.list
        mode: "0644"
        content: |
          deb [signed-by=/usr/share/keyrings/sury-php.gpg] https://packages.sury.org/php/ {{ ansible_distribution_release }} main

    - name: Install requested PHP versions side-by-side
      # The role uses composer for path resolution, not PHP — but composer
      # invocations need php-cli + the common ext set composer relies on
      # (mbstring for unicode, xml for installed.json parse, zip for
      # downloads). Without these, composer install errors before any
      # script-dispatch decision is reached.
      ansible.builtin.apt:
        name:
          - "php{{ v }}-cli"
          - "php{{ v }}-mbstring"
          - "php{{ v }}-xml"
          - "php{{ v }}-zip"
        state: present
        update_cache: true
      loop: "{{ matrix_php_versions }}"
      loop_control:
        loop_var: v

    # --- Composer (versioned phars with self-verifying checksums) ---
    - name: Fetch official SHA-256 for each pinned composer patch from getcomposer.org
      # composer.phar.sha256sum content format: hex digest followed by two
      # spaces and "composer.phar". Capture only the hex digest. This
      # avoids maintaining checksums in this playbook — if getcomposer.org
      # is compromised, the URL fetch returning a tampered phar AND a
      # matching tampered checksum is the only failure mode the role can't
      # catch on its own (same root of trust as the upstream installer).
      ansible.builtin.uri:
        url: "https://getcomposer.org/download/{{ item.patch }}/composer.phar.sha256sum"
        return_content: true
      register: composer_checksum_fetch
      loop: "{{ matrix_composer_versions }}"
      loop_control:
        label: "{{ item.patch }}"

    - name: Build composer SHA-256 map (patch -> hex digest)
      # composer.phar.sha256sum format: "<64-hex>  composer.phar\n". Split
      # on whitespace and take the first token — same way `sha256sum -c`
      # parses the file. The previous regex_replace approach failed because
      # YAML single-quoted strings pass backslashes through literally, so
      # '\\s' reached Python re as a literal backslash-s pattern instead
      # of a whitespace metaclass — regex never matched and the value was
      # set to the full file content, which get_url then rightly rejected.
      ansible.builtin.set_fact:
        composer_sha_map: >-
          {{ composer_sha_map | default({}) | combine({
            item.item.patch: (item.content.split() | first)
          }) }}
      loop: "{{ composer_checksum_fetch.results }}"
      loop_control:
        label: "{{ item.item.patch }}"

    - name: Download composer phars to versioned paths (checksum-verified)
      ansible.builtin.get_url:
        url: "https://getcomposer.org/download/{{ item.patch }}/composer.phar"
        dest: "/usr/local/bin/composer-{{ item.minor }}.phar"
        checksum: "sha256:{{ composer_sha_map[item.patch] }}"
        mode: "0755"
      loop: "{{ matrix_composer_versions }}"
      loop_control:
        label: "{{ item.minor }} ({{ item.patch }})"

    # --- Node.js (side-by-side via tarballs) ---
    # Sury doesn't ship Node. Nodesource ships one major per repo and
    # conflicts on `nodejs` package, so multiple-side-by-side via apt
    # isn't viable. Tarballs from nodejs.org are the standard pattern.
    # Pinned to current LTS patches; bump as new LTS patches release.
    - name: Download Node.js tarballs to /opt
      ansible.builtin.unarchive:
        src: "https://nodejs.org/dist/v{{ item.full }}/node-v{{ item.full }}-linux-x64.tar.xz"
        dest: /opt
        remote_src: true
        creates: "/opt/node-v{{ item.full }}-linux-x64"
      loop:
        - { major: "20", full: "20.18.1" }
        - { major: "22", full: "22.12.0" }

    - name: Symlink Node directories to versioned paths (/opt/node-N)
      ansible.builtin.file:
        src: "/opt/node-v{{ item.full }}-linux-x64"
        dest: "/opt/node-{{ item.major }}"
        state: link
      loop:
        - { major: "20", full: "20.18.1" }
        - { major: "22", full: "22.12.0" }

    # --- uv (side-by-side via GitHub release tarballs) ---
    # uv is a single statically-linked Rust binary distributed at
    # github.com/astral-sh/uv/releases. Downloaded versions land at
    # /usr/local/bin/uv-<version>; switchers/uv.sh swaps the active
    # /usr/local/bin/uv symlink. Patch versions pinned for reproducibility.
    - name: Install uv versions side-by-side to /usr/local/bin/uv-<version>
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          url="https://github.com/astral-sh/uv/releases/download/{{ item }}/uv-x86_64-unknown-linux-gnu.tar.gz"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "$url" | tar -xz -C "$tmpdir"
          install -m 0755 "$tmpdir"/uv-x86_64-unknown-linux-gnu/uv "/usr/local/bin/uv-{{ item }}"
        creates: "/usr/local/bin/uv-{{ item }}"
        executable: /bin/bash
      loop:
        - "0.4.30"
        - "0.5.7"
        - "0.6.0"

    # --- Deno (side-by-side via GitHub release zips) ---
    # Deno is distributed at github.com/denoland/deno/releases as .zip
    # archives. unzip is needed (jammy/noble/bookworm all have it in apt
    # by default). Downloaded versions land at /usr/local/bin/deno-<version>;
    # switchers/deno.sh copies the active one to /usr/local/bin/deno
    # (copy, not symlink, so the role's `mv deno deno-real` works cleanly).
    - name: Ensure unzip is installed (needed for deno releases)
      ansible.builtin.apt:
        name: [unzip]
        state: present

    - name: Install deno versions side-by-side to /usr/local/bin/deno-<version>
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          url="https://github.com/denoland/deno/releases/download/v{{ item }}/deno-x86_64-unknown-linux-gnu.zip"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "$url" -o "$tmpdir/deno.zip"
          unzip -q "$tmpdir/deno.zip" -d "$tmpdir"
          install -m 0755 "$tmpdir/deno" "/usr/local/bin/deno-{{ item }}"
        creates: "/usr/local/bin/deno-{{ item }}"
        executable: /bin/bash
      loop:
        - "1.46.3"
        - "2.0.6"
        - "2.1.4"

    # --- Bun (side-by-side via GitHub release zips) ---
    # Bun is distributed at github.com/oven-sh/bun/releases. Each release
    # has bun-linux-x64.zip containing the single bun binary. Pinned to
    # recent stable patches; bump as new releases land.
    - name: Install bun versions side-by-side to /usr/local/bin/bun-<version>
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          url="https://github.com/oven-sh/bun/releases/download/bun-v{{ item }}/bun-linux-x64.zip"
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "$url" -o "$tmpdir/bun.zip"
          unzip -q "$tmpdir/bun.zip" -d "$tmpdir"
          install -m 0755 "$tmpdir/bun-linux-x64/bun" "/usr/local/bin/bun-{{ item }}"
        creates: "/usr/local/bin/bun-{{ item }}"
        executable: /bin/bash
      loop:
        - "1.0.30"
        - "1.1.20"
        - "1.2.0"

    # --- Ruby + bundler (system ruby; bundler from apt) ---
    # Each distro's default ruby covers the ruby-version dimension via
    # the cross-distro axis. ruby-dev is needed for the fixture's
    # extconf gem build (17-bundler-behavioral.bats's KNOWN GAP test
    # auto-skips if the gem fixture isn't built).
    - name: Install ruby + bundler from apt
      ansible.builtin.apt:
        name: [ruby, ruby-dev, ruby-bundler]
        state: present

    - name: Build ruby-extconf-gem fixture (gives 17-bundler-behavioral KNOWN GAP test something to exercise)
      ansible.builtin.shell:
        cmd: cd /opt/test-fixtures/ruby-extconf-gem && gem build test-extconf.gemspec
        creates: /opt/test-fixtures/ruby-extconf-gem/test-extconf-1.0.0.gem
        executable: /bin/bash
      # Fixture path must exist (added by `COPY tests/fixtures` step in
      # Dockerfile.matrix). If the gemspec is missing this task is a
      # no-op via creates: — the behavioral test will just skip.
      failed_when: false

    # --- Java + Maven + Gradle (for the JVM matrix ecosystems) ---
    # openjdk-17-jdk-headless is in apt main on jammy/noble/bookworm. apt
    # maven and apt gradle are used for the "bundled" cells; specific
    # versions get downloaded as tarballs for the version-specific cells.
    - name: Install JDK 17 + apt-bundled maven and gradle
      ansible.builtin.apt:
        name: [openjdk-17-jdk-headless, maven, gradle]
        state: present

    - name: Download Apache Maven 3.9.9 tarball
      # ALWAYS use archive.apache.org, NEVER dlcdn.apache.org for pinned
      # versions. dlcdn is Apache's "current release" CDN — it only hosts
      # the latest patch and rotates older ones off as new patches ship.
      # archive.apache.org is the canonical permanent home for every
      # released Apache artifact. Previous version of this task used
      # dlcdn and 404'd the entire matrix every distro the moment a new
      # maven patch shipped upstream.
      ansible.builtin.unarchive:
        src: "https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz"
        dest: /opt
        remote_src: true
        creates: /opt/apache-maven-3.9.9

    - name: Download Gradle 8.5 distribution
      ansible.builtin.unarchive:
        src: "https://services.gradle.org/distributions/gradle-8.5-bin.zip"
        dest: /opt
        remote_src: true
        creates: /opt/gradle-8.5

    # --- .NET SDK (for the nuget matrix ecosystem) ---
    # Microsoft's apt repo varies per (distro, version) pair. The official
    # dotnet-install.sh script is cross-distro and downloads the SDK
    # tarball directly — simpler than maintaining per-distro repo configs.
    # libicu is a hard runtime dep; apt's libicu-dev pulls whatever
    # libicu version the distro ships.
    - name: Install libicu (runtime dep for dotnet)
      ansible.builtin.apt:
        name: [libicu-dev]
        state: present

    - name: Install .NET SDK 8.0 via dotnet-install.sh
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          chmod +x /tmp/dotnet-install.sh
          /tmp/dotnet-install.sh --channel 8.0 --install-dir /usr/share/dotnet
          rm -f /tmp/dotnet-install.sh
        creates: /usr/share/dotnet/dotnet
        executable: /bin/bash

    - name: Symlink dotnet to /usr/local/bin so it's on PATH
      ansible.builtin.file:
        src: /usr/share/dotnet/dotnet
        dest: /usr/local/bin/dotnet
        state: link
        force: true

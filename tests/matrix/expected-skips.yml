---
# Known version-specific test behaviors that should NOT fail the matrix.
#
# Format: top-level key is ecosystem. Each entry is:
#   - test:    the exact bats test name (the string after "ok N" / "not ok N")
#     when:    Jinja-like dict of conditions. Supported keys:
#                distro: "jammy", "noble", "bookworm", ... (OS codename
#                        from /etc/os-release VERSION_CODENAME; defaults
#                        to "*" if omitted)
#                lang:   "8.1", "8.2", ... (defaults to "*")
#                tool:   "1.10", "2.7", ... (defaults to "*")
#              Entry matches when ALL specified kv-pairs match the cell.
#              Wildcards via comma-separated values, e.g. tool: "1.10,2.7,2.8"
#              or distro: "jammy,bookworm".
#     reason:  one-line explanation. Surfaced in the matrix JSON output.
#     expect:  "skip" (test should self-skip; pass if it does) or
#              "fail"  (test is expected to assert-fail on this cell;
#                       pass if it returns "not ok").
#
# The driver compares each (cell, test, status) against this list:
#   - test pass:          always counted as success
#   - test "not ok":      success if matched entry says expect=fail; else FAIL
#   - test skip:          success if matched entry says expect=skip; else
#                         counted as success too (skip is rarely a failure
#                         signal — but the matrix surfaces it in output)
#
# Initial entries (seeded from the wrapper investigation):

composer:
  - test: "LAYERED DEFENSE: composer-real alone (env-var layer still active) is still blocked"
    when: { tool: "1.10,2.7,2.8" }
    expect: fail
    reason: >-
      COMPOSER_SKIP_SCRIPTS env var was added in composer 2.9.0. On older
      composer the env-var layer is silently a no-op, so composer-real
      install (without the wrapper) runs scripts even though the env var
      is set. The wrapper layer still blocks `composer install` — only the
      belt-and-suspenders layer degrades.

  - test: "Composer audit.block-insecure is enabled (Composer >=2.9 tier)"
    when: { tool: "1.10,2.7,2.8" }
    expect: fail
    reason: >-
      audit.block-insecure config key was added in composer 2.9.0. The role's
      template tier logic correctly omits it on older composer, so the
      asserted-present test fails. Tier-rendering test covers this case
      synthetically; this entry handles the real binary.

  - test: "Composer audit.block-abandoned is enabled (Composer >=2.9 tier)"
    when: { tool: "1.10,2.7,2.8" }
    expect: fail
    reason: Same as block-insecure — config key requires composer 2.9.0+.

  - test: "Composer audit.abandoned defaults to fail (Composer >=2.7; test env runs 2.9+)"
    when: { tool: "1.10" }
    expect: fail
    reason: >-
      audit.abandoned config key was added in composer 2.7.0. On composer 1.x
      the role's template omits the entire audit block, so the assertion fails.

pnpm:
  - test: "pnpm config.yaml: ignoreScripts true (pnpm 11+ blocks project scripts)"
    when: { tool: "10" }
    expect: fail
    reason: >-
      pnpm 10 reads ~/.config/pnpm/rc (ini format), not config.yaml. The
      role deploys config.yaml unconditionally for pnpm 11+ forward compat,
      but pnpm 10 won't honor it — the rc file is what controls behavior
      on this version. Test asserts a config.yaml setting that pnpm 10
      ignores. Not a role bug; the version-keyed file choice is the whole
      point of deploying both files.

  - test: "pnpm rc: ignore-scripts=true"
    when: { tool: "11" }
    expect: fail
    reason: >-
      Mirror of the above: pnpm 11+ stopped reading the ini rc file. The
      role still deploys it for pnpm 10 backwards compat, but pnpm 11
      ignores it — config.yaml is what controls behavior on 11+. Test
      asserts an rc setting that pnpm 11 doesn't honor.

# pip and uv: no seeded entries. Add as observed divergences appear from
# real cross-distro runs. The pip wrapper and uv invocations should be
# version-stable in principle; if any test fails on a specific (lang, tool)
# pair, surface it here with a reason rather than fixing the test.

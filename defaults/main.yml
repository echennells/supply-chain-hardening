---
# Minimum package age — 48 hours across all package managers
# Each manager uses different units, so we derive from one source of truth
release_age_hours: 48

# Derived values (do not override individually — change release_age_hours).
#
# Type note: Ansible default Jinja renders all template results as strings.
# Each derived value below ends up as a string like "2" or "2880", even
# though it represents a number. That's fine for all current consumers,
# which interpolate the value into config files (.npmrc, bunfig.toml, env
# vars) where the receiving tool parses it as int. If a future consumer
# needs numeric semantics in a Jinja expression (comparison, arithmetic),
# apply `| int` at the point of use.
#
# `release_age_hours | int` on the input handles the case where the user
# overrides via CLI (`-e release_age_hours=72`), which Ansible passes as
# a string. Without the cast, `(release_age_hours / 24)` would error on
# string-divided-by-int.
npm_minimum_release_age_days: "{{ (release_age_hours | int / 24) | int }}"     # 2 days
pnpm_minimum_release_age_minutes: "{{ (release_age_hours | int * 60) | int }}" # 2880 min
bun_minimum_release_age_seconds: "{{ (release_age_hours | int * 3600) | int }}"  # 172800 sec
# uv requires an absolute RFC 3339 datetime here — "48 hours" or similar
# relative-duration strings fail with "failed to parse year in date '48 hours'"
# and break every uv invocation. Compute the cutoff via lookup('pipe', ...)
# shelling out to GNU date because Ansible's strftime filter's `utc` arg
# was only added in Ansible 2.13 — Ubuntu 22.04's apt ansible (2.12) rejects
# the 3-arg form with "strftime() takes from 1 to 2 positional arguments
# but 3 were given". The previous Jinja-strftime approach broke the role
# on every jammy host.
#
# lookup('pipe', ...) runs on the controller; ansible_date_time.epoch is
# the target's epoch. Both produce the same RFC 3339 from the same epoch
# input, so this works correctly for remote-target apply too. Requires
# GNU date on the controller (Linux yes; macOS controllers need
# `brew install coreutils` for `date -u -d @...` syntax).
#
# Cutoff freezes at apply time — re-apply to advance. For "always exactly
# N hours back" semantics, schedule periodic re-applies.
uv_exclude_newer: "{{ lookup('pipe', 'date -u -d @' ~ (ansible_date_time.epoch | int - release_age_hours | int * 3600) ~ ' +%Y-%m-%dT%H:%M:%SZ') }}"
yarn_minimal_age_gate: "{{ (release_age_hours | int / 24) | int }}d"           # "2d"
deno_minimum_dependency_age: "P{{ (release_age_hours | int / 24) | int }}D"    # "P2D"

# npm settings
npm_ignore_scripts: true
npm_audit: true
npm_save_exact: true
npm_fund: false
npm_update_notifier: false

# pip/python settings
pip_only_binary: true
pip_disable_version_check: true
python_dont_write_bytecode: true

# uv settings
uv_no_build: true
# uv settings (additions from the version-tiering audit; see docs/version-tiering-audit.md)
uv_index_strategy: "first-index"        # anti-dep-confusion; alternatives: unsafe-best-match, unsafe-first-match
uv_allow_insecure_host: []              # allowlist of hosts allowed to skip TLS verification; empty = none

# go settings
go_sumdb: "sum.golang.org"
go_proxy: "https://proxy.golang.org,direct"
# Bypass knobs — kept empty so no module is exempted from sumdb / proxy / HTTPS.
# Setting any to a pattern (e.g. "example.com/*") weakens hardening.
go_private: ""
go_noproxy: ""
go_insecure: ""
goflags_mod: "readonly"

# pnpm settings
# Strict mode: fail the install when an age-gate violation occurs instead of
# silently falling back to whatever version is available. Default true matches
# the role's posture (fail loud, not fail silent).
pnpm_minimum_release_age_strict: true
# Packages exempt from the age gate. Use for your own packages where you push
# updates and want to install them immediately rather than wait for the gate.
# Example: pnpm_minimum_release_age_exclude: ["@myorg/internal-pkg", "scoped/own"]
pnpm_minimum_release_age_exclude: []
# Build-script allowlist (pnpm 11+ `onlyBuiltDependencies` semantics).
# Empty list (default) → block all build scripts via ignore-scripts=true.
# Non-empty list → switch to onlyBuiltDependencies semantics: only these
# packages' build scripts are allowed to run; everything else is blocked.
# Example: pnpm_built_dependencies: ["esbuild", "sharp"]
#
# IMPORTANT: this allowlist is user-scoped only. /etc/npmrc carries the
# strict default (`ignore-scripts=true`) for sudo / other-user / cron
# coverage. The allowlist is written to ~/.config/pnpm/rc (and pnpm 11's
# ~/.config/pnpm/config.yaml) for the deploying user. Consequence:
# `sudo pnpm install` in a project requiring esbuild's postinstall will
# hit /etc/npmrc's blanket block and the install will be broken, despite
# the operator having configured the allowlist. This is intentional —
# allowlists are user preferences, restrictions are system policy — but
# it surprises users who expect the allowlist to apply system-wide. To
# enable an allowlist for a non-deploying user, deploy a per-user
# ~/.config/pnpm/rc under that user's home with the same setting.
pnpm_built_dependencies: []

# bun settings (additions from the version-tiering audit; see docs/version-tiering-audit.md)
bun_exact: true                  # exact version pinning
bun_lifecycle_scripts: false     # block postinstall/preinstall scripts
bun_frozen_lockfile: true        # refuse install if package.json diverges from lockfile
bun_auto: "disable"              # alternatives: auto, fallback, force.
# IMPORTANT: this setting affects `bun install` only — NOT `bun run`.
# Per bun's docs: "Currently, bunfig.toml is only automatically loaded
# for `bun run` in a local project (it doesn't check for a global
# .bunfig.toml)." Setting auto="disable" in ~/.bunfig.toml stops `bun
# install`'s fallback auto-install behavior but does NOT block `bun run
# script.ts` from silently downloading missing imports. The runtime
# auto-install gap is closed by the bun_path_wrapper (see below) which
# injects --no-install on every runtime invocation. Keep this set to
# "disable" anyway — it's defense-in-depth on the install path.
bun_save_text_lockfile: true     # text-format bun.lock (bun 1.2+); silently ignored on older

# bun security scanner integration (opt-in).
# Set to a scanner package name (e.g. "@socketsecurity/bun-security-scanner")
# to hook bun install into the Bun.Security.Scanner API for malware /
# typosquatting / supply-chain attack detection. The named package must be
# installed in each project as a devDep — `bun add -d <name>` — for bun's
# resolver to find it. Empty default = no [install.security] section
# emitted, so `bun install` works in projects that haven't added the
# scanner devDep.
#
# Note: this is the ONLY Socket integration path for bun. The role's sfw
# (Socket Firewall) wrapper covers npm but not bun — sfw-free supports
# npm/pnpm/yarn/pip/uv/cargo, not bun. The scanner API closes the gap.
#
# When using @socketsecurity/bun-security-scanner specifically, set
# SOCKET_API_KEY in the calling process's env to authenticate against
# your org's Socket settings; unauthenticated runs use Socket's free
# public API with org-default policy.
bun_security_scanner: ""

# bun PATH wrapper (default on; closes the runtime auto-install gap).
# bun has a "runtime auto-install" feature: `bun run script.ts` silently
# downloads missing imports from npm and executes them, with no install
# prompt, no lockfile update, no audit trail. This is convenient for
# scripting and a real supply-chain hole — a typo'd package name becomes
# the install vector (typosquat attack pattern). The wrapper at
# /usr/local/bin/bun (or wherever bun is found) injects --no-install on
# every non-package-management invocation, closing the gap. Set to
# false to skip wrapping; the install-time protections (lifecycleScripts,
# minimumReleaseAge, frozenLockfile, scanner) still apply via the
# global ~/.bunfig.toml regardless of this var. See
# templates/bun-wrapper.sh.j2 header for the full design + bypass
# documentation.
bun_path_wrapper: true

# yarn settings
yarn_enable_scripts: false
# yarn settings (additions from the version-tiering audit; see docs/version-tiering-audit.md)
yarn_enable_immutable_installs: true    # refuse install if lockfile would change
yarn_enable_immutable_cache: true       # prevent cache mutation during install
yarn_checksum_behavior: "throw"         # error on checksum mismatch (alternatives: ignore, update, reset)
yarn_approved_git_repositories: []      # allowlist of git-URL globs; empty = block all git deps
yarn_unsafe_http_whitelist: []          # allowlist of HTTP-allowed hosts; empty = HTTPS-only
yarn_enable_hardened_mode: true         # lockfile-tampering defense (Yarn 4.0+); silently no-op on <4.0

# socket firewall
socket_firewall_install: true

# Refresh auditing tools (cargo-audit, govulncheck, pip-audit, etc.) on this run.
# Default false: installs only happen on first run (idempotent via `creates:`).
# Set to true via CLI — `ansible-playbook site.yml -e refresh_tools=true` — to
# re-install everything regardless of whether the binary already exists. Useful
# after a toolchain upgrade (Go, Rust, etc.) where existing binaries are valid
# but built against an older compiler, or when you want the latest @latest
# versions of @latest-pinned tools.
refresh_tools: false

# npm PATH wrapper (default on; the agent-relevant protection layer)
# Deploys /usr/local/bin/npm as a wrapper that routes calls through Socket
# Firewall so scripts/agents/CI get threat-intel checks too (the shell-alias
# fallback for npq only fires in interactive shells, which agents almost
# never use). Set to false on hosts where you don't want the ~50-200ms per
# npm invocation cost or the hard dependency on sfw being available.
npm_path_wrapper: true

# Deno PATH wrapper (default on; in-place at the discovered deno binary)
# Deno has no global config file — the only way to enforce a minimum
# dependency age across all invocations is to inject the flag itself. The
# wrapper replaces the deno binary in-place (preserving the original as
# `<path>-real`) and injects --minimum-dependency-age on every dep-fetching
# subcommand. Set to false to fall back to the alias-only mechanism (which
# only fires in interactive shells). Note: re-running Deno's installer
# overwrites the wrapper; re-apply the role after a Deno upgrade.
deno_path_wrapper: true

# composer settings
# Tier auto-selected from the detected Composer version at apply time:
#   Composer >= 2.9 : allow-plugins + audit (abandoned + block-insecure + block-abandoned)
#   Composer 2.7-2.8: allow-plugins + audit (abandoned only; block-* added in 2.9)
#   Composer < 2.7  : allow-plugins only (audit key added in 2.7.0)
#   Not installed   : safe baseline; re-run after install to upgrade the tier
# Variables below apply on the tiers that support each key; older Composer
# silently ignores them (the template omits them entirely to keep config.json
# valid on parsers that may reject unknown keys).
composer_audit_abandoned: "fail"        # ignore|report|fail (Composer >= 2.7)
composer_audit_block_insecure: true     # Composer >= 2.9 only
composer_audit_block_abandoned: true    # Composer >= 2.9 only
# Composer plugin execution. Authoritative across BOTH config layers:
#   - templates/composer-config.json.j2 writes "allow-plugins": <this>
#   - templates/composer-wrapper.sh.j2 injects --no-plugins iff this is false
# Setting to true is the documented opt-in path for users with legitimate
# composer Plugin classes (composer/installers, phpstan/extension-installer,
# etc.). Doing so still leaves --no-scripts injected, so post-install-cmd
# and friends remain blocked. Default false = no plugins, no scripts.
#
# (--no-plugins was previously hardcoded in the wrapper regardless of this
# var, making this knob decorative whenever composer_path_wrapper was on.
# Both layers are now authoritative on the same var.)
composer_allow_plugins: false

# Composer PATH wrapper (default on; primary script-blocking layer).
# Composer has no host-wide config/env knob for disabling script execution
# — COMPOSER_NO_SCRIPTS and "scripts-are-disabled" are made-up names that
# composer ignores entirely. The wrapper at /usr/local/bin/composer (or
# /usr/bin/composer on apt-installed hosts) injects --no-scripts and
# --no-plugins on every invocation. Belt-and-suspenders second layer is
# COMPOSER_SKIP_SCRIPTS=<events> in /etc/environment + /etc/profile.d,
# which catches composer-real and `php composer.phar` callers in PAM-
# loaded shells (composer >= 2.9). Documented bypass for both layers:
# `COMPOSER_SKIP_SCRIPTS= /usr/local/bin/composer-real install`. Set
# this var to false to restore the real binary at the wrap location on
# next apply (env-var layer remains).
composer_path_wrapper: true

# cargo / Rust hardening.
#
# Cargo cannot block build.rs or proc-macro code execution — those gaps are
# structural. The role's cargo hardening is therefore split across:
#   1. ~/.cargo/config.toml — the small set of cargo-level knobs that mean
#      something on Linux (git-fetch-with-cli, net.retry, optional install
#      root).
#   2. /etc/cargo/deny.toml — a reference cargo-deny policy. Not auto-applied
#      to projects; copy or symlink into the project root, or pass via
#      `cargo deny --config /etc/cargo/deny.toml check`.
#   3. cargo-audit / cargo-deny / cargo-vet / cargo-cooldown — installed via
#      cargo-binstall when cargo is present. Detection-oriented; users still
#      need to wire them into CI.
#
# Set this to false on hosts where you ship your own deny.toml from another
# config-management layer and don't want the role overwriting /etc/cargo/.
cargo_deny_deploy: true

# `cargo install` output root. Empty default = ~/.cargo/bin (cargo's
# built-in default). Setting this to a system path (e.g. "/usr/local/cargo")
# emits `[install] root = "<path>"` in the config — useful when you want
# installed cargo binaries to land in a directory you can lock down with
# stricter mode bits or immutable-filesystem mounts. Note: an empty
# string is the explicit "don't emit the [install] block" signal, NOT
# the same as "/" or "~/.cargo".
cargo_install_root: ""

# podman / container image hardening
podman_enabled: false           # set true to install podman and deploy policy.json
podman_disable_docker: false    # set true to stop and disable Docker
podman_docker_compat: false     # set true to symlink docker.sock to podman
# Registry allowlist. Entries can be bare hosts (`ghcr.io`) or
# path-qualified (`ghcr.io/myorg`). The two consumers handle them
# differently — by podman's design, not the role's choice:
#
#   /etc/containers/policy.json — honors the full entry. Path-qualified
#     entries restrict allow-list enforcement to that sub-namespace
#     (`ghcr.io/myorg/*` accepted; other `ghcr.io/*` rejected).
#
#   /etc/containers/registries.conf — strips `/.*` and dedupes. The
#     `unqualified-search-registries` field is host-only (search registries
#     don't have a notion of paths). Combined with `short-name-mode =
#     "enforcing"`, this surface only affects the interactive prompt for
#     short-name resolution (`podman pull alpine`).
#
# Practical implication: path-qualified entries are honored as a real
# allow-restriction by policy.json. If you set `["ghcr.io/myorg"]`, you
# get path-level enforcement at the gatekeeper layer, and `ghcr.io` as
# a search registry for short-name prompts.
podman_allowed_registries:
  - "docker.io"
  - "docker.io/library"
  - "ghcr.io"
  - "quay.io"
  - "mcr.microsoft.com"
  - "gcr.io"

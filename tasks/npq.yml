---
# npq pre-install reputation checks
# Aliases deployed system-wide via /etc/profile.d/

- name: Check if npm is installed
  # Canonical-path-first detection across system + Node-manager install
  # methods. See tasks/npm.yml for the same logic explained.
  ansible.builtin.shell:
    cmd: |
      for p in /usr/bin/npm /usr/local/bin/npm "$HOME/.volta/bin/npm" "$HOME/.asdf/shims/npm" "$HOME/.nodenv/shims/npm"; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      for p in "$HOME"/.nvm/versions/node/*/bin/npm; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      for p in "$HOME"/.local/share/fnm/node-versions/*/installation/bin/npm; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH" command -v npm 2>/dev/null
    executable: /bin/bash
  register: npm_for_npq
  changed_when: false
  failed_when: false

- name: Check if npq is already installed
  ansible.builtin.command: which npq-hero
  register: npq_check
  changed_when: false
  failed_when: false
  when: npm_for_npq.rc == 0

- name: Install npq globally
  ansible.builtin.command: npm install -g npq
  changed_when: true
  when:
    - npm_for_npq.rc == 0
    - npq_check.rc != 0

- name: Deploy npq aliases and config system-wide
  become: true
  ansible.builtin.copy:
    dest: /etc/profile.d/npq-aliases.sh
    mode: "0644"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      # Route npm/yarn/pnpm through npq pre-install checks
      export NPQ_DISABLE_AUTO_CONTINUE=true
      alias npm='npq-hero'
      alias yarn='NPQ_PKG_MGR=yarn npq-hero'
      alias pnpm='NPQ_PKG_MGR=pnpm npq-hero'

---
# uv / Python supply chain hardening
# Config deployed unconditionally; pip-redirect wrappers ONLY deployed when uv
# is actually present — otherwise the wrapper would recurse into itself and
# brick pip system-wide. See tests/bats/22-pip-wrapper-safety.bats.

- name: Create uv config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/uv"
    state: directory
    mode: "0755"

- name: Deploy hardened uv.toml
  ansible.builtin.template:
    src: uv.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/uv/uv.toml"
    mode: "0644"

- name: Create system-wide uv config directory
  become: true
  ansible.builtin.file:
    path: /etc/uv
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy hardened /etc/uv/uv.toml (system-wide; covers sudo and non-deploying users)
  # uv's documented system config path on Linux/macOS. Without it,
  # `sudo uv pip install` (HOME=/root) and other-user invocations miss
  # exclude-newer (age gate) and no-build (wheels-only), the two
  # protections that block fresh malicious releases and setup.py
  # execution respectively.
  #
  # IMPORTANT: do NOT pair this with UV_NO_SYSTEM_CONFIG=1 in
  # /etc/environment or /etc/profile.d/. uv 0.11.16+ honors that env
  # var by skipping this file entirely — and PAM-loaded shells (login,
  # interactive sudo with env_reset) will see the env var, defeating
  # this fallback in exactly the contexts it exists for.
  become: true
  ansible.builtin.template:
    src: uv.toml.j2
    dest: /etc/uv/uv.toml
    owner: root
    group: root
    mode: "0644"

- name: Find uv binary path
  # Check the canonical install location first. `bash -lc` (login shell) was
  # the previous approach but it's fragile: the uv installer adds PATH only
  # to ~/.bashrc, and login shells source ~/.bash_profile (not ~/.bashrc).
  # On real hosts where the user follows the official installer, a login
  # shell may have empty PATH for ~/.local/bin and `command -v uv` returns
  # nothing — pip wrappers then silently don't deploy.
  ansible.builtin.shell:
    cmd: |
      for p in "$HOME/.local/bin/uv" /usr/local/bin/uv /usr/bin/uv; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH" command -v uv 2>/dev/null
    executable: /bin/bash
  register: uv_binary_path
  changed_when: false
  failed_when: false

- name: Deploy pip wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      # Belt-and-suspenders: refuse to run if uv isn't where we expect,
      # rather than recursing into ourselves and bricking pip.
      UV='{{ uv_binary_path.stdout }}'
      if [ -z "$UV" ] || [ ! -x "$UV" ]; then
        echo "[supply-chain-hardening] error: uv not found at '$UV'; refusing to recurse" >&2
        exit 127
      fi
      echo "[supply-chain-hardening] pip redirected through uv" >&2
      exec "$UV" pip "$@"
  when: uv_binary_path.rc == 0 and uv_binary_path.stdout | length > 0

- name: Deploy pip3 wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip3
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      UV='{{ uv_binary_path.stdout }}'
      if [ -z "$UV" ] || [ ! -x "$UV" ]; then
        echo "[supply-chain-hardening] error: uv not found at '$UV'; refusing to recurse" >&2
        exit 127
      fi
      echo "[supply-chain-hardening] pip3 redirected through uv" >&2
      exec "$UV" pip "$@"
  when: uv_binary_path.rc == 0 and uv_binary_path.stdout | length > 0

- name: Install uv-managed tools
  # Use the absolute uv path we already discovered, not bare `uv`. Ansible's
  # connection environment doesn't include ~/.local/bin (uv installer's
  # default location); the installer only adds it to ~/.bashrc, which
  # ansible never sources. Bare `uv tool install` then exits 127 and aborts
  # the whole play, taking down every downstream task group. Container CI
  # passes because the Dockerfile prepends /root/.local/bin to PATH — but
  # fresh hosts following the official installer instructions don't.
  ansible.builtin.command:
    cmd: "{{ uv_binary_path.stdout }} tool install {{ item }}"
    creates: "{{ omit if refresh_tools | bool else ansible_env.HOME + '/.local/bin/' + item }}"
  loop:
    - uv-secure
    - pip-audit
  when: uv_binary_path.rc == 0 and uv_binary_path.stdout | length > 0

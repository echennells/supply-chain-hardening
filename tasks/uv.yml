---
# uv / Python supply chain hardening
# Config deployed unconditionally; pip-redirect wrappers ONLY deployed when uv
# is actually present — otherwise the wrapper would recurse into itself and
# brick pip system-wide. See tests/bats/22-pip-wrapper-safety.bats.

- name: Create uv config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/uv"
    state: directory
    mode: "0755"

- name: Deploy hardened uv.toml
  ansible.builtin.template:
    src: uv.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/uv/uv.toml"
    mode: "0644"

- name: Find uv binary path
  ansible.builtin.command: bash -lc "command -v uv"
  register: uv_binary_path
  changed_when: false
  failed_when: false

- name: Deploy pip wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      # Belt-and-suspenders: refuse to run if uv isn't where we expect,
      # rather than recursing into ourselves and bricking pip.
      UV='{{ uv_binary_path.stdout }}'
      if [ -z "$UV" ] || [ ! -x "$UV" ]; then
        echo "[supply-chain-hardening] error: uv not found at '$UV'; refusing to recurse" >&2
        exit 127
      fi
      echo "[supply-chain-hardening] pip redirected through uv" >&2
      exec "$UV" pip "$@"
  when: uv_binary_path.rc == 0 and uv_binary_path.stdout | length > 0

- name: Deploy pip3 wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip3
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      UV='{{ uv_binary_path.stdout }}'
      if [ -z "$UV" ] || [ ! -x "$UV" ]; then
        echo "[supply-chain-hardening] error: uv not found at '$UV'; refusing to recurse" >&2
        exit 127
      fi
      echo "[supply-chain-hardening] pip3 redirected through uv" >&2
      exec "$UV" pip "$@"
  when: uv_binary_path.rc == 0 and uv_binary_path.stdout | length > 0

- name: Install uv-managed tools
  ansible.builtin.command:
    cmd: "uv tool install {{ item }}"
    creates: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
  loop:
    - uv-secure
    - pip-audit
  when: uv_binary_path.rc == 0 and uv_binary_path.stdout | length > 0

---
# uv / Python supply chain hardening
# Config and wrappers deployed unconditionally

- name: Create uv config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/uv"
    state: directory
    mode: "0755"

- name: Deploy hardened uv.toml
  ansible.builtin.template:
    src: uv.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/uv/uv.toml"
    mode: "0644"

- name: Find uv binary path
  ansible.builtin.command: bash -lc "which uv"
  register: uv_binary_path
  changed_when: false
  failed_when: false

- name: Deploy pip wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      echo "[supply-chain-hardening] pip redirected through uv" >&2
      exec {{ uv_binary_path.stdout | default(ansible_env.HOME + '/.local/bin/uv') }} pip "$@"
  when: uv_binary_path.rc == 0 or ansible_user_id is defined

- name: Deploy pip3 wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip3
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      echo "[supply-chain-hardening] pip3 redirected through uv" >&2
      exec {{ uv_binary_path.stdout | default(ansible_env.HOME + '/.local/bin/uv') }} pip "$@"
  when: uv_binary_path.rc == 0 or ansible_user_id is defined

- name: Install uv-managed tools
  ansible.builtin.command:
    cmd: "uv tool install {{ item }}"
    creates: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
  loop:
    - uv-secure
    - pip-audit
  when: uv_binary_path.rc == 0

---
# pip is redirected to uv via system-wide wrappers (see uv.yml)
# This task deploys pip.conf as a fallback in case the real pip binary
# is invoked directly (bypassing the wrapper) — e.g. on hosts without uv.

- name: Create pip config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/pip"
    state: directory
    mode: "0755"

- name: Deploy hardened pip.conf as fallback
  ansible.builtin.template:
    src: pip.conf.j2
    dest: "{{ ansible_env.HOME }}/.config/pip/pip.conf"
    mode: "0644"

- name: Deploy hardened /etc/pip.conf (system-wide; covers sudo and non-deploying users)
  # pip's config search order is global (/etc/pip.conf) → user
  # (~/.config/pip/pip.conf) → site (venv). Without the system file,
  # `sudo pip install` (HOME=/root) and other-user invocations see no
  # hardening — bypassing the only-binary=:all: protection that blocks
  # setup.py execution.
  become: true
  ansible.builtin.template:
    src: pip.conf.j2
    dest: /etc/pip.conf
    owner: root
    group: root
    mode: "0644"

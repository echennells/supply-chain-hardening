---
- name: Check if socket firewall is already installed
  ansible.builtin.command: which sfw
  register: sfw_check
  changed_when: false
  failed_when: false

- name: Check if npm is available for socket install
  # Canonical-path-first detection across system + Node-manager install
  # methods. See tasks/npm.yml for the same logic explained.
  ansible.builtin.shell:
    cmd: |
      for p in /usr/bin/npm /usr/local/bin/npm "$HOME/.volta/bin/npm" "$HOME/.asdf/shims/npm" "$HOME/.nodenv/shims/npm"; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      for p in "$HOME"/.nvm/versions/node/*/bin/npm; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      for p in "$HOME"/.local/share/fnm/node-versions/*/installation/bin/npm; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH" command -v npm 2>/dev/null
    executable: /bin/bash
  register: npm_for_socket
  changed_when: false
  failed_when: false

- name: Check Node.js version (sfw requires >= 20)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      node --version | sed 's/v\([0-9]*\).*/\1/'
    executable: /bin/bash
  register: node_major_version
  changed_when: false
  failed_when: false
  when: npm_for_socket.rc == 0

- name: Install Socket Firewall Free via npm (requires Node >= 20)
  become: true
  ansible.builtin.command: npm install -g sfw@2
  when:
    - sfw_check.rc != 0
    - npm_for_socket.rc == 0
    - node_major_version.stdout | int >= 20
  changed_when: true

- name: Warn if Node too old for Socket Firewall
  ansible.builtin.debug:
    msg: "WARNING: Socket Firewall requires Node >= 20 but found Node {{ node_major_version.stdout }}. Skipping sfw install."
  when:
    - npm_for_socket.rc == 0
    - node_major_version.stdout | int < 20

- name: Ensure sfw cache directory is writable
  become: true
  ansible.builtin.file:
    path: /usr/local/lib/node_modules/sfw/.sfw-cache
    state: directory
    mode: "0755"
  failed_when: false
  when:
    - npm_for_socket.rc == 0
    - node_major_version.stdout | int >= 20

# --- npm PATH wrapper (opt-in via npm_path_wrapper) ---
# Without this, sfw is installed but never invoked except by callers who
# explicitly type `sfw npm install ...`. The wrapper interposes at the
# PATH level so every npm call (scripts, agents, sudo, package.json
# lifecycles) is routed through sfw.

- name: Find real npm path (excluding /usr/local/bin to avoid wrapper recursion)
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      CLEAN_PATH=$(echo "$PATH" | tr ':' '\n' | grep -vFx '/usr/local/bin' | tr '\n' ':' | sed 's/:$//')
      PATH="$CLEAN_PATH" command -v npm 2>/dev/null
    executable: /bin/bash
  register: npm_real_path
  changed_when: false
  failed_when: false
  when:
    - npm_path_wrapper | bool
    - npm_for_socket.rc == 0

- name: Deploy npm PATH wrapper to /usr/local/bin
  become: true
  ansible.builtin.template:
    src: npm-wrapper.sh.j2
    dest: /usr/local/bin/npm
    mode: "0755"
    owner: root
    group: root
  when:
    - npm_path_wrapper | bool
    - npm_for_socket.rc == 0
    - npm_real_path.rc == 0
    - npm_real_path.stdout | length > 0

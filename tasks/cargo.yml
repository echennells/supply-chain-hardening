---
# Cargo/Rust supply chain hardening
# Config deployed unconditionally; auditing tools only install if cargo exists.

- name: Create cargo config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cargo"
    state: directory
    mode: "0755"

- name: Deploy hardened cargo config.toml
  ansible.builtin.template:
    src: cargo-config.toml.j2
    dest: "{{ ansible_env.HOME }}/.cargo/config.toml"
    mode: "0644"

- name: Check if cargo is installed
  # Check the canonical rustup install location first. rustup (the dominant
  # cargo installer) puts the binary at ~/.cargo/bin/cargo and adds PATH only
  # via ~/.cargo/env (sourced from ~/.bashrc and ~/.profile). Plain `which
  # cargo` from ansible's connection environment may not see ~/.cargo/bin
  # on non-interactive / automated runs where .bashrc isn't sourced.
  ansible.builtin.shell:
    cmd: |
      for p in "$HOME/.cargo/bin/cargo" /usr/local/bin/cargo /usr/bin/cargo; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="$HOME/.cargo/bin:/usr/local/bin:/usr/bin:/bin:$PATH" command -v cargo 2>/dev/null
    executable: /bin/bash
  register: cargo_check
  changed_when: false
  failed_when: false

- name: Bootstrap cargo-binstall (prebuilt — avoids multi-minute source compile of audit tools)
  # cargo-binstall pulls prebuilt binaries from each crate's GitHub releases,
  # auto-detecting the right target triple. cargo-audit alone takes ~15min to
  # source-build on small VMs; binstall drops it in seconds. The bootstrap
  # itself uses the project's official installer, which fetches the prebuilt
  # binstall binary (no source compile). Failure here is non-fatal: the next
  # task falls back to plain `cargo install`.
  ansible.builtin.shell:
    cmd: >-
      curl -L --proto '=https' --tlsv1.2 -sSf
      https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh
      | bash
    creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo-binstall"
  when: cargo_check.rc == 0
  failed_when: false

- name: Install cargo auditing tools (prebuilt via binstall when present, source-build fallback)
  ansible.builtin.shell:
    cmd: |
      set -e
      export PATH="$HOME/.cargo/bin:$PATH"
      if [ -x "$HOME/.cargo/bin/cargo-binstall" ]; then
        cargo binstall --no-confirm {{ item }} || cargo install {{ item }}
      else
        cargo install {{ item }}
      fi
    creates: "{{ omit if refresh_tools | bool else ansible_env.HOME + '/.cargo/bin/' + item }}"
  loop:
    - cargo-audit
    - cargo-deny
    - cargo-vet
    - cargo-cooldown
  when: cargo_check.rc == 0

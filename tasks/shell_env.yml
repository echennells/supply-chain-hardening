---
# System-wide supply chain environment variables
# Deployed to /etc/profile.d/ so they apply to ALL users, ALL shells,
# ALL login types — interactive, non-interactive, agent-spawned.
# Config files deployed unconditionally — harmless if the tool isn't
# installed yet, ready the instant it is.

- name: Deploy system-wide supply chain env vars
  become: true
  ansible.builtin.template:
    src: supply-chain-env.sh.j2
    dest: /etc/profile.d/supply-chain-hardening.sh
    mode: "0644"
    owner: root
    group: root
  tags: [shell]

- name: Deploy to /etc/environment for non-login shells
  become: true
  ansible.builtin.blockinfile:
    path: /etc/environment
    marker: "# {mark} SUPPLY CHAIN HARDENING (managed by ansible)"
    create: true
    mode: "0644"
    block: |
      NPM_CONFIG_IGNORE_SCRIPTS={{ npm_ignore_scripts | lower }}
      NPM_CONFIG_AUDIT={{ npm_audit | lower }}
      NPM_CONFIG_SAVE_EXACT={{ npm_save_exact | lower }}
      NPM_CONFIG_FUND={{ npm_fund | lower }}
      NPM_CONFIG_UPDATE_NOTIFIER={{ npm_update_notifier | lower }}
      NPM_CONFIG_MINIMUM_RELEASE_AGE={{ npm_minimum_release_age_days }}
      PYTHONDONTWRITEBYTECODE={{ python_dont_write_bytecode | int }}
      PIP_DISABLE_PIP_VERSION_CHECK={{ pip_disable_version_check | int }}
      UV_LINK_MODE=copy
      GOSUMDB={{ go_sumdb }}
      GOPROXY={{ go_proxy }}
      GOFLAGS=-mod={{ goflags_mod }}
      GOPRIVATE={{ go_private }}
      GONOPROXY={{ go_noproxy }}
      GOINSECURE={{ go_insecure }}
      GOTOOLCHAIN=local
      COMPOSER_SKIP_SCRIPTS=pre-install-cmd,post-install-cmd,pre-update-cmd,post-update-cmd,pre-status-cmd,post-status-cmd,pre-autoload-dump,post-autoload-dump,post-root-package-install,post-create-project-cmd,pre-archive-cmd,post-archive-cmd,pre-package-install,post-package-install,pre-package-update,post-package-update,pre-package-uninstall,post-package-uninstall,init,command,pre-file-download,post-file-download,pre-command-run,pre-pool-create
      COMPOSER_ALLOW_SUPERUSER=1
  tags: [shell]

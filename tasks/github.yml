---
# GitHub Actions supply chain hardening tools
# Ref: tj-actions/changed-files tag retargeting compromise (March 2025)

- name: Check if uv is installed (for zizmor)
  # Same canonical-path-first lookup as tasks/uv.yml. Plain `which uv` would
  # silently miss uv installed via the official installer when ansible's
  # connection environment lacks ~/.local/bin (common on automated runs).
  ansible.builtin.shell:
    cmd: |
      for p in "$HOME/.local/bin/uv" /usr/local/bin/uv /usr/bin/uv; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH" command -v uv 2>/dev/null
    executable: /bin/bash
  register: uv_for_github
  changed_when: false
  failed_when: false

- name: Install zizmor (GitHub Actions workflow auditor)
  # Use absolute uv path — same reasoning as tasks/uv.yml. Bare `uv`
  # exits 127 on hosts where uv is in ~/.local/bin but PATH wasn't
  # exported to ansible's connection environment.
  ansible.builtin.command:
    cmd: "{{ uv_for_github.stdout }} tool install zizmor"
    creates: "{{ omit if refresh_tools | bool else ansible_env.HOME + '/.local/bin/zizmor' }}"
  when: uv_for_github.rc == 0

- name: Check if go is installed (for pinact)
  # Canonical-path-first detection. See tasks/go.yml for the same logic.
  ansible.builtin.shell:
    cmd: |
      for p in /usr/local/go/bin/go /usr/bin/go /usr/local/bin/go "$HOME/sdk/go/bin/go"; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="/usr/local/go/bin:/usr/local/bin:/usr/bin:/bin:$PATH" command -v go 2>/dev/null
    executable: /bin/bash
  register: go_for_github
  changed_when: false
  failed_when: false

- name: Install pinact (with toolchain auto-fetch for this install only)
  # Same toolchain collision as govulncheck in tasks/go.yml: pinact may
  # require a newer go than the host's stock version, and GOTOOLCHAIN=local
  # (set by the role's own hardening) prevents go from auto-fetching a
  # newer toolchain to build it. Scope GOTOOLCHAIN=auto to this install
  # only, keeping the global hardening intact for user-driven go calls.
  # Also use the absolute go path so bare `go` isn't required on PATH.
  ansible.builtin.command:
    cmd: "{{ go_for_github.stdout }} install github.com/suzuki-shunsuke/pinact/cmd/pinact@latest"
    creates: "{{ omit if refresh_tools | bool else ansible_env.HOME + '/go/bin/pinact' }}"
  environment:
    GOTOOLCHAIN: auto
  when: go_for_github.rc == 0

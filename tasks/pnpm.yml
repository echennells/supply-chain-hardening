---
# pnpm supply chain hardening
# Config deployed unconditionally

- name: Determine pnpm global config path
  # pnpm's resolution order, per https://pnpm.io/npmrc :
  #   1. $XDG_CONFIG_HOME/pnpm  (if XDG_CONFIG_HOME is set, regardless of OS)
  #   2. ~/Library/Preferences/pnpm  (macOS default, env-paths convention)
  #   3. ~/.config/pnpm  (Linux/other default)
  # Many developer macOS environments set XDG_CONFIG_HOME to ~/.config for
  # cross-platform consistency, in which case pnpm reads from there rather
  # than the native macOS location. Writing to the wrong location is silent
  # failure — pnpm just doesn't see our hardening — so mirror pnpm's logic.
  ansible.builtin.set_fact:
    pnpm_config_dir: >-
      {{
        ansible_env.XDG_CONFIG_HOME ~ '/pnpm'
        if ansible_env.XDG_CONFIG_HOME is defined and ansible_env.XDG_CONFIG_HOME | length > 0
        else (
          ansible_env.HOME ~ '/Library/Preferences/pnpm'
          if ansible_os_family == 'Darwin'
          else ansible_env.HOME ~ '/.config/pnpm'
        )
      }}

- name: Create pnpm config directory
  ansible.builtin.file:
    path: "{{ pnpm_config_dir }}"
    state: directory
    mode: "0755"

- name: Deploy hardened pnpm rc
  ansible.builtin.copy:
    dest: "{{ pnpm_config_dir }}/rc"
    mode: "0644"
    content: |
      ; Managed by ansible-supply-chain-security
      minimum-release-age={{ pnpm_minimum_release_age_minutes }}
      ignore-scripts=true
      block-exotic-subdeps=true

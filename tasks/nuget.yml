---
# NuGet (.NET) supply chain hardening

- name: Check if dotnet is installed
  ansible.builtin.command: which dotnet
  register: dotnet_check
  changed_when: false
  failed_when: false

- name: Create NuGet config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.nuget/NuGet"
    state: directory
    mode: "0755"
  when: dotnet_check.rc == 0

- name: Deploy NuGet.Config with supply chain hardening
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.nuget/NuGet/NuGet.Config"
    mode: "0644"
    content: |
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <!-- Clear inherited sources, only allow official nuget.org -->
        <packageSources>
          <clear />
          <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
        </packageSources>
        <config>
          <!-- Require signed packages -->
          <add key="signatureValidationMode" value="require" />
        </config>
      </configuration>
  when: dotnet_check.rc == 0

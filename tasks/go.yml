---
# Go supply chain hardening
# Env vars deployed system-wide via /etc/profile.d/ and /etc/environment
# (see shell_env.yml). This task handles tool installs only.

- name: Check if go is installed
  # Check canonical install locations first. /usr/local/go/bin/go is where
  # the official tarball installer puts go, but many users don't add it to
  # PATH globally — they source it via .profile or .bashrc, which ansible's
  # connection may not see on automated runs. Plain `which go` then misses
  # the installed binary entirely.
  ansible.builtin.shell:
    cmd: |
      for p in /usr/local/go/bin/go /usr/bin/go /usr/local/bin/go "$HOME/sdk/go/bin/go"; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="/usr/local/go/bin:/usr/local/bin:/usr/bin:/bin:$PATH" command -v go 2>/dev/null
    executable: /bin/bash
  register: go_check
  changed_when: false
  failed_when: false

- name: Install govulncheck (with toolchain auto-fetch for this install only)
  # Three things collide here without this fix:
  #   1. `go install golang.org/x/vuln/cmd/govulncheck@latest` requires a
  #      toolchain new enough to build the latest govulncheck (currently
  #      go 1.24+). Ubuntu 24.04's stock go is 1.22.
  #   2. The role just set GOTOOLCHAIN=local system-wide (correctly — that's
  #      part of the hardening). With local, go refuses to auto-download a
  #      newer toolchain even when go.mod requires one.
  #   3. With (1) + (2), `go install` aborts with a toolchain error, which
  #      fails the play and skips every downstream task.
  # GOTOOLCHAIN=auto scoped to JUST this command lets go download whatever
  # toolchain govulncheck needs, without changing the system-wide GOTOOLCHAIN
  # value that protects user `go install` calls. Also uses the absolute go
  # path we already discovered — bare `go` wouldn't be reachable on hosts
  # where ansible's connection PATH lacks /usr/local/go/bin.
  ansible.builtin.command:
    cmd: "{{ go_check.stdout }} install golang.org/x/vuln/cmd/govulncheck@latest"
    creates: "{{ omit if refresh_tools | bool else ansible_env.HOME + '/go/bin/govulncheck' }}"
  environment:
    GOTOOLCHAIN: auto
  when: go_check.rc == 0

---
# Pre-flight validation that runs before any ecosystem task.
# Tagged `always` in tasks/main.yml so it executes regardless of which
# ecosystem tag the operator chose; we want input validation even on
# narrow runs like `--tags npm`.

- name: Validate release_age_hours is at least 1
  ansible.builtin.assert:
    that:
      - release_age_hours | int >= 1
    fail_msg: >-
      release_age_hours must be >= 1 (got {{ release_age_hours }}).
      Setting to 0 or negative silently disables the age gate across
      npm, pnpm, bun, yarn, uv, and deno — that's one of the role's
      load-bearing protections. If you need to install a fresh
      package, override per invocation (e.g. `npm install --foreground-scripts
      --ignore-scripts=false`) rather than disabling globally.

- name: Probe GNU date for uv_exclude_newer rendering
  # defaults/main.yml renders uv_exclude_newer via
  #   lookup('pipe', 'date -u -d @<epoch> +%Y-%m-%dT%H:%M:%SZ')
  # which requires GNU date (Linux) or coreutils' `gdate` (macOS). BSD
  # date (macOS default) lacks the `-d @<epoch>` syntax — the lookup
  # silently returns an empty string, which then gets templated into
  # /etc/uv/uv.toml as `exclude-newer = ""`. uv rejects empty datetime
  # values with a parser error, breaking every uv invocation. This
  # check fails loudly at preflight rather than silently at runtime.
  ansible.builtin.command: date -u -d @0 +%Y-%m-%dT%H:%M:%SZ
  register: gnu_date_probe
  changed_when: false
  failed_when: false

- name: Fail when GNU date is unavailable on the controller
  ansible.builtin.fail:
    msg: |
      The role's uv_exclude_newer default uses `lookup('pipe', 'date -u -d @<epoch>')`
      which requires GNU date. Your controller's date refused the probe:

        $ date -u -d @0 +%Y-%m-%dT%H:%M:%SZ
        rc={{ gnu_date_probe.rc }}
        {{ gnu_date_probe.stderr or gnu_date_probe.stdout }}

      Fix:
        - Linux: install coreutils (`apt install coreutils`) — usually already present.
        - macOS: `brew install coreutils` and either:
            * prepend the GNU prefix to PATH before running ansible:
              `export PATH="$(brew --prefix)/opt/coreutils/libexec/gnubin:$PATH"`
              (gives `date` GNU semantics for this shell only)
            * OR override uv_exclude_newer to an explicit RFC 3339 string in
              your inventory:
              `-e 'uv_exclude_newer=2026-05-24T12:00:00Z'`
          Do NOT symlink gdate over /usr/local/bin/date system-wide — other
          macOS tools depend on BSD date semantics.
        - To skip this check (and ship empty exclude-newer, which breaks uv):
          `-e skip_gnu_date_check=true` — not recommended.
  when:
    - gnu_date_probe.rc != 0 or gnu_date_probe.stdout != "1970-01-01T00:00:00Z"
    - not (skip_gnu_date_check | default(false) | bool)

- name: Detect non-managed existing system config files
  # Each /etc/* file we deploy has a marker comment line. If a file
  # already exists without the marker, it was placed by someone or
  # something else (corporate registry config, sysadmin override,
  # distribution package, etc.). Refuse to overwrite without explicit
  # operator opt-in — silently clobbering a /etc/npmrc with corporate
  # registry settings is the worst-case scenario (dependency confusion).
  ansible.builtin.shell:
    cmd: |
      set -e
      missing_marker=0
      conflict=""
      for f in /etc/npmrc /etc/yarnrc.yml /etc/pip.conf /etc/uv/uv.toml; do
        if [ -f "$f" ] && ! grep -q "Managed by ansible-supply-chain-security" "$f" 2>/dev/null; then
          missing_marker=1
          conflict="${conflict}${f}\n"
        fi
      done
      if [ "$missing_marker" -eq 1 ]; then
        printf "%b" "$conflict"
        exit 42
      fi
    executable: /bin/bash
  register: etc_preflight
  changed_when: false
  failed_when: false
  become: true

- name: Fail when /etc config files exist without the role's marker
  ansible.builtin.fail:
    msg: |
      Refusing to overwrite existing system config files that were not
      placed by this role:

      {{ etc_preflight.stdout }}

      These files are commonly used for corporate registry / proxy /
      auth settings; overwriting them blindly can cause registry-takeover
      vulnerabilities (dependency confusion) or break installs entirely.

      To proceed, either:
        1. Back up the existing files and remove them, then re-run; or
        2. Set `accept_etc_overwrite=true` to overwrite anyway (e.g.
           `ansible-playbook site.yml -e accept_etc_overwrite=true`).
  when:
    - etc_preflight.rc == 42
    - not (accept_etc_overwrite | default(false) | bool)

---
# npm supply chain hardening
# Config files deployed unconditionally — ready when npm arrives

- name: Deploy hardened .npmrc (per-user)
  # Template-driven so npm_ignore_scripts / npm_audit / npm_save_exact /
  # npm_fund / npm_update_notifier actually control behavior. Previously
  # this content was hardcoded inline, which made those variables
  # misleading: setting npm_ignore_scripts=false did nothing for the
  # config files (only the env var). The template now makes the variable
  # names match what they actually do.
  ansible.builtin.template:
    src: npmrc.j2
    dest: "{{ ansible_env.HOME }}/.npmrc"
    mode: "0644"

- name: Deploy hardened /etc/npmrc (system-wide; covers sudo and non-deploying users)
  # The per-user ~/.npmrc above only protects the user the role was run
  # against. `sudo npm install` flips $HOME to /root and misses it; same
  # for any other account on the host. /etc/npmrc is npm's documented
  # global config (the default value of npm's `globalconfig` setting) and
  # is also read by pnpm as the lowest-priority layer in its resolution
  # chain — so one file covers both tools for every user including root.
  become: true
  ansible.builtin.template:
    src: etc-npmrc.j2
    dest: /etc/npmrc
    owner: root
    group: root
    mode: "0644"

- name: Check if npm is installed
  # Check canonical locations across the most common Node install methods
  # before falling back to a PATH search. Plain `which npm` from ansible's
  # connection environment misses npm when the user installed Node via nvm,
  # fnm, volta, asdf, etc. — those tools add PATH only through ~/.bashrc.
  # Coverage: system (apt/dnf), volta, asdf, nodenv, nvm, fnm.
  ansible.builtin.shell:
    cmd: |
      for p in /usr/bin/npm /usr/local/bin/npm "$HOME/.volta/bin/npm" "$HOME/.asdf/shims/npm" "$HOME/.nodenv/shims/npm"; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      for p in "$HOME"/.nvm/versions/node/*/bin/npm; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      for p in "$HOME"/.local/share/fnm/node-versions/*/installation/bin/npm; do
        if [ -x "$p" ]; then
          echo "$p"
          exit 0
        fi
      done
      PATH="/usr/local/bin:/usr/bin:/bin:$HOME/.local/bin:$PATH" command -v npm 2>/dev/null
    executable: /bin/bash
  register: npm_check
  changed_when: false
  failed_when: false

- name: Check if lockfile-lint is already installed
  ansible.builtin.command: which lockfile-lint
  register: lockfile_lint_check
  changed_when: false
  failed_when: false
  when: npm_check.rc == 0

- name: Install lockfile-lint globally
  ansible.builtin.command: npm install -g lockfile-lint
  changed_when: true
  when:
    - npm_check.rc == 0
    - lockfile_lint_check.rc != 0

---
# Bundler/RubyGems supply chain hardening
# Config deployed unconditionally
# Note: Ruby has NO install script blocking — extconf.rb always runs

- name: Create bundler config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.bundle"
    state: directory
    mode: "0755"

- name: Deploy hardened bundler config
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.bundle/config"
    mode: "0644"
    content: |
      ---
      BUNDLE_FROZEN: "true"
      BUNDLE_DEPLOYMENT: "true"
      BUNDLE_DISABLE_EXEC_LOAD: "true"

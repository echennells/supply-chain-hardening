  ansible.builtin.include_tasks: bun.yml
  tags: [bun]

- name: Include pip/python hardening
  ansible.builtin.include_tasks: pip.yml
  tags: [pip, python]

- name: Include uv hardening
  ansible.builtin.include_tasks: uv.yml
  tags: [uv, python]

- name: Include deno hardening
  ansible.builtin.include_tasks: deno.yml
  tags: [deno]

- name: Include cargo/rust hardening
  ansible.builtin.include_tasks: cargo.yml
  tags: [cargo, rust]

- name: Include go hardening
  ansible.builtin.include_tasks: go.yml

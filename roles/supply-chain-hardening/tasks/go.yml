---
# Go module supply chain hardening
# Ref: Socket.dev BufferZoneCorp attack — malicious init() poisoned GOSUMDB, GOPROXY, GOFLAGS

- name: Check if go is installed
  ansible.builtin.command: which go
  register: go_check
  changed_when: false
  failed_when: false

- name: Install govulncheck for vulnerability scanning
  ansible.builtin.command: go install golang.org/x/vuln/cmd/govulncheck@latest
  when: go_check.rc == 0
  changed_when: true
  failed_when: false

# All Go env vars set in both shell profiles to establish a known-good baseline.
# A malicious init() can override these in-process, but they protect interactive
# use and scripts that shell out to `go`.

- name: Set Go supply chain env vars in zshrc
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} GO SUPPLY CHAIN HARDENING (managed by ansible)"
    create: true
    mode: "0644"
    block: |
      # Checksum verification — never disable
      export GOSUMDB='{{ go_sumdb }}'
      # Pin proxy to official — prevents redirect to attacker endpoints
      export GOPROXY='{{ go_proxy }}'
      # Prevent go.mod changes without explicit action
      export GOFLAGS='-mod={{ goflags_mod }}'
      # Do not skip checksum verification for any module
      export GONOSUMCHECK=''
      export GONOSUMDB=''
  when: go_check.rc == 0

- name: Set Go supply chain env vars in bashrc
  ansible.builtin.blockinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    marker: "# {mark} GO SUPPLY CHAIN HARDENING (managed by ansible)"
    create: true
    mode: "0644"
    block: |
      export GOSUMDB='{{ go_sumdb }}'
      export GOPROXY='{{ go_proxy }}'
      export GOFLAGS='-mod={{ goflags_mod }}'
      export GONOSUMCHECK=''
      export GONOSUMDB=''
  when: go_check.rc == 0

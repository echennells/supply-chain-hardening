---
# pip is replaced by uv wrappers (see uv.yml)
# This task only installs pip-audit as a scanning tool

- name: Check if uv is available
  ansible.builtin.command: which uv
  register: uv_for_pip
  changed_when: false
  failed_when: false

- name: Install pip-audit via uv
  ansible.builtin.command: uv tool install pip-audit
  when: uv_for_pip.rc == 0
  changed_when: true
  failed_when: false

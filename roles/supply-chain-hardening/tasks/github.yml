---
# GitHub Actions supply chain hardening tools
# Ref: tj-actions/changed-files tag retargeting compromise (March 2025)

- name: Check if uv is installed (for zizmor)
  ansible.builtin.command: which uv
  register: uv_for_github
  changed_when: false
  failed_when: false

- name: Install zizmor (GitHub Actions workflow auditor)
  ansible.builtin.command: uv tool install zizmor
  when: uv_for_github.rc == 0
  changed_when: true
  failed_when: false

- name: Check if go is installed (for pinact)
  ansible.builtin.command: which go
  register: go_for_github
  changed_when: false
  failed_when: false

- name: Install pinact (pin GitHub Actions to commit SHAs)
  ansible.builtin.command: go install github.com/suzuki-shunsuke/pinact/cmd/pinact@latest
  when: go_for_github.rc == 0
  changed_when: true
  failed_when: false

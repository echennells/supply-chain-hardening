---
# Composer (PHP) supply chain hardening
# Config deployed unconditionally
# COMPOSER_NO_SCRIPTS=1 is also set system-wide in /etc/environment

- name: Create composer config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/composer"
    state: directory
    mode: "0755"

- name: Deploy hardened composer config.json
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/composer/config.json"
    mode: "0644"
    content: |
      {
        "config": {
          "scripts-are-disabled": true,
          "secure-http": true,
          "lock": true,
          "preferred-install": "dist",
          "audit": {
            "abandoned": "report"
          }
        }
      }

---
# pnpm supply chain hardening
# Config deployed unconditionally

- name: Determine pnpm global config path
  ansible.builtin.set_fact:
    pnpm_config_dir: "{{ (ansible_os_family == 'Darwin') | ternary(ansible_env.HOME ~ '/Library/Preferences/pnpm', ansible_env.HOME ~ '/.config/pnpm') }}"

- name: Create pnpm config directory
  ansible.builtin.file:
    path: "{{ pnpm_config_dir }}"
    state: directory
    mode: "0755"

- name: Deploy hardened pnpm rc
  ansible.builtin.copy:
    dest: "{{ pnpm_config_dir }}/rc"
    mode: "0644"
    content: |
      ; Managed by ansible-supply-chain-security
      minimum-release-age={{ pnpm_minimum_release_age_minutes }}
      ignore-scripts=true
      block-exotic-subdeps=true

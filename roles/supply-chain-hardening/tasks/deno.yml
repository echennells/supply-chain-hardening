---
- name: Check if deno is installed
  ansible.builtin.command: which deno
  register: deno_check
  changed_when: false
  failed_when: false

- name: Add deno alias with minimum dependency age to zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "alias deno='command deno --minimum-dependency-age={{ deno_minimum_dependency_age }}'"
    regexp: "^alias deno="
    create: true
    mode: "0644"
  when: deno_check.rc == 0

- name: Add deno alias with minimum dependency age to bashrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: "alias deno='command deno --minimum-dependency-age={{ deno_minimum_dependency_age }}'"
    regexp: "^alias deno="
    create: true
    mode: "0644"
  when: deno_check.rc == 0

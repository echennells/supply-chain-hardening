---
- name: Check if socket firewall is already installed
  ansible.builtin.command: which sfw
  register: sfw_check
  changed_when: false
  failed_when: false

- name: Check if npm is available for socket install
  ansible.builtin.command: which npm
  register: npm_for_socket
  changed_when: false
  failed_when: false

- name: Install Socket Firewall Free via npm
  become: true
  ansible.builtin.command: npm install -g sfw
  when: sfw_check.rc != 0 and npm_for_socket.rc == 0
  changed_when: true
  failed_when: false

- name: Ensure sfw cache directory is writable
  become: true
  ansible.builtin.file:
    path: /usr/local/lib/node_modules/sfw/.sfw-cache
    state: directory
    mode: "0777"
  failed_when: false

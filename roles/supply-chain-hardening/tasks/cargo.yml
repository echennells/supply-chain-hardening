---
# Cargo/Rust supply chain hardening
# Config deployed unconditionally

- name: Create cargo config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cargo"
    state: directory
    mode: "0755"

- name: Deploy hardened cargo config.toml
  ansible.builtin.template:
    src: cargo-config.toml.j2
    dest: "{{ ansible_env.HOME }}/.cargo/config.toml"
    mode: "0644"

- name: Install cargo-audit
  ansible.builtin.command: cargo install cargo-audit
  changed_when: true
  failed_when: false

- name: Install cargo-deny
  ansible.builtin.command: cargo install cargo-deny
  changed_when: true
  failed_when: false

- name: Install cargo-vet
  ansible.builtin.command: cargo install cargo-vet
  changed_when: true
  failed_when: false

- name: Install cargo-cooldown
  ansible.builtin.command: cargo install cargo-cooldown
  changed_when: true
  failed_when: false

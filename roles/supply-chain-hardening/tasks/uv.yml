---
# uv / Python supply chain hardening
# Config and wrappers deployed unconditionally

- name: Create uv config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/uv"
    state: directory
    mode: "0755"

- name: Deploy hardened uv.toml
  ansible.builtin.template:
    src: uv.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/uv/uv.toml"
    mode: "0644"

- name: Deploy pip wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      # Redirects pip to uv pip so all uv hardening applies
      exec uv pip "$@"

- name: Deploy pip3 wrapper to /usr/local/bin (system-wide, delegates to uv)
  become: true
  ansible.builtin.copy:
    dest: /usr/local/bin/pip3
    mode: "0755"
    owner: root
    group: root
    content: |
      #!/bin/sh
      # Managed by ansible-supply-chain-security
      exec uv pip "$@"

- name: Install uv-secure
  ansible.builtin.command: uv tool install uv-secure
  changed_when: true
  failed_when: false

- name: Install pip-audit
  ansible.builtin.command: uv tool install pip-audit
  changed_when: true
  failed_when: false

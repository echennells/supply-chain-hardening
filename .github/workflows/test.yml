name: Test Supply Chain Hardening

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build test container
        run: docker build -t supply-chain-test -f tests/Dockerfile .

      - name: Run tests
        run: docker run --rm supply-chain-test

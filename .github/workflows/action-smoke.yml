name: Action smoke test

on:
  push:
    branches: [main, feat/**]
    paths:
      - 'action/**'
      - '.github/workflows/action-smoke.yml'
  pull_request:
    paths:
      - 'action/**'
      - '.github/workflows/action-smoke.yml'

jobs:
  action-defaults:
    name: 'Action: default invocation works'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./action
        id: harden

      - name: Outputs are populated
        run: |
          echo "ecosystems-hardened=${{ steps.harden.outputs.ecosystems-hardened }}"
          echo "release-age-hours=${{ steps.harden.outputs.release-age-hours }}"
          echo "sfw-installed=${{ steps.harden.outputs.sfw-installed }}"
          test -n "${{ steps.harden.outputs.ecosystems-hardened }}"
          test "${{ steps.harden.outputs.release-age-hours }}" = "48"

      - name: Env vars propagated to subsequent step
        run: |
          test "$NPM_CONFIG_IGNORE_SCRIPTS" = "true"
          test "$NPM_CONFIG_AUDIT" = "true"
          test "$PIP_DISABLE_PIP_VERSION_CHECK" = "1"

      - name: Config files written to $HOME
        run: |
          grep -q "ignore-scripts=true" "$HOME/.npmrc"
          grep -q "ignoreScripts: true" "$HOME/.config/pnpm/config.yaml"
          grep -q "enableScripts: false" "$HOME/.yarnrc.yml"
          grep -q "only-binary = :all:" "$HOME/.config/pip/pip.conf"
          grep -q "no-build = true" "$HOME/.config/uv/uv.toml"

      - name: /etc files written (write_etc default true)
        run: |
          sudo grep -q "ignore-scripts=true" /etc/npmrc
          sudo grep -q "only-binary = :all:" /etc/pip.conf

  action-blocks-postinstall:
    name: 'Action: blocks npm postinstall (the actual attack)'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./action
        with:
          ecosystems: npm

      - name: Attempt to install fixture with postinstall — must be blocked
        run: |
          rm -f /tmp/postinstall-marker
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install ${GITHUB_WORKSPACE}/tests/fixtures/npm-postinstall-pkg 2>&1 || true
          if [ -f /tmp/postinstall-marker ]; then
            echo "::error::Postinstall ran — hardening did NOT block it. This is the bug the action exists to prevent."
            exit 1
          fi
          echo "✓ postinstall correctly blocked"

  action-subset:
    name: 'Action: subset selection (npm,pip only)'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./action
        id: harden
        with:
          ecosystems: npm,pip
          write_etc: 'false'   # also exercise the opt-out path

      - name: Only requested ecosystems hardened
        run: |
          test "${{ steps.harden.outputs.ecosystems-hardened }}" = "npm,pip"
          # npm + pip configs exist
          test -f "$HOME/.npmrc"
          test -f "$HOME/.config/pip/pip.conf"
          # pnpm/yarn/uv configs do NOT exist
          test ! -f "$HOME/.config/pnpm/config.yaml"
          test ! -f "$HOME/.yarnrc.yml"
          test ! -f "$HOME/.config/uv/uv.toml"

      - name: write_etc=false skipped system files
        run: |
          if [ -f /etc/npmrc ]; then
            echo "::error::/etc/npmrc was written despite write_etc=false"
            exit 1
          fi

  action-rejects-bad-input:
    name: 'Action: rejects release_age_hours=0'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./action
        id: harden
        continue-on-error: true
        with:
          release_age_hours: '0'

      - name: Action must have failed
        run: |
          if [ "${{ steps.harden.outcome }}" != "failure" ]; then
            echo "::error::Action did not fail on release_age_hours=0 (outcome: ${{ steps.harden.outcome }})"
            exit 1
          fi
          echo "✓ action correctly refused release_age_hours=0"

  action-blocks-pnpm-project-script:
    name: 'Action: blocks pnpm project-level postinstall (pnpm 11 config.yaml is load-bearing)'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - name: Install pnpm via corepack
        run: corepack enable && corepack prepare pnpm@latest --activate && pnpm --version

      - uses: ./action
        with:
          ecosystems: pnpm

      # pnpm 11 BLOCKS dependency build scripts by default (without our help) —
      # the meaningful test is whether it blocks the PROJECT'S OWN postinstall,
      # which pnpm 11 runs unless ignoreScripts: true is set in config.yaml.
      # That's the file the action deploys and the file pnpm 11 actually reads.
      - name: Project-level postinstall must be blocked
        run: |
          rm -f /tmp/marker-pnpm-project
          mkdir -p /tmp/pnpm-victim && cd /tmp/pnpm-victim
          cat > package.json <<'EOF'
          {
            "name": "victim",
            "version": "1.0.0",
            "scripts": {"postinstall": "touch /tmp/marker-pnpm-project"}
          }
          EOF
          pnpm install --ignore-workspace 2>&1 | tail -3 || true
          if [ -f /tmp/marker-pnpm-project ]; then
            echo "::error::pnpm project postinstall RAN — action's config.yaml is not effective"
            exit 1
          fi
          echo "✓ pnpm 11 project-level postinstall blocked via config.yaml"

  action-blocks-uv-sdist:
    name: 'Action: uv pip install refuses sdist (setup.py blocked via no-build)'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install uv (the action's recommended Python interface)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Build the sdist BEFORE the action runs. The action's hardening blocks
      # sdist BUILDS via uv no-build, so once the action runs we can't even
      # build the fixture. Building during this step is fine — the action
      # hasn't applied yet.
      - name: Build malicious-pattern sdist fixture
        run: |
          python3 -m pip install --quiet --break-system-packages setuptools
          cd ${GITHUB_WORKSPACE}/tests/fixtures/python-setup-exfil
          python3 setup.py sdist 2>&1 | tail -3
          ls dist/

      - uses: ./action
        with:
          ecosystems: uv

      # Note: we test uv, not pip. `pip install <local-sdist>` with
      # only-binary=:all: turns out NOT to block local file paths in
      # modern pip (only-binary applies to PyPI resolution, not explicit
      # file arguments). uv's no-build setting DOES refuse sdist builds
      # regardless of source. The action's README explicitly recommends
      # uv as the safe Python interface; this test verifies that
      # recommendation holds.
      - name: uv pip install must refuse the sdist
        run: |
          rm -f /tmp/marker-python-setup-exfil
          sdist=$(ls ${GITHUB_WORKSPACE}/tests/fixtures/python-setup-exfil/dist/*.tar.gz | head -1)
          uv venv /tmp/uv-victim >/dev/null 2>&1
          VIRTUAL_ENV=/tmp/uv-victim uv pip install "$sdist" 2>&1 | tail -5 || true
          if [ -f /tmp/marker-python-setup-exfil ]; then
            echo "::error::uv ran setup.py — no-build=true was not honored"
            exit 1
          fi
          echo "✓ uv refused sdist build — setup.py never ran"

  action-pip-only-binary-limitation:
    name: 'DOCUMENTED LIMIT: pip only-binary does not block local-file sdist install'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Build fixture sdist before hardening applies
        run: |
          python3 -m pip install --quiet --break-system-packages setuptools
          cd ${GITHUB_WORKSPACE}/tests/fixtures/python-setup-exfil
          python3 setup.py sdist 2>&1 | tail -3

      - uses: ./action
        with:
          ecosystems: pip

      # Locks in the documented limit: `python3 -m pip install <local-sdist>`
      # bypasses only-binary=:all: in modern pip (the flag applies to PyPI
      # resolution, not explicit file arguments). README's "CLI flags beat
      # config in pip" limitation extends here. If a future pip change
      # actually starts enforcing only-binary for local file paths, this
      # test will fail and tell us we can tighten the README.
      - name: Local sdist install via pip SHOULD succeed (documenting the gap)
        run: |
          rm -f /tmp/marker-python-setup-exfil
          sdist=$(ls ${GITHUB_WORKSPACE}/tests/fixtures/python-setup-exfil/dist/*.tar.gz | head -1)
          python3 -m pip install --break-system-packages "$sdist" 2>&1 | tail -3 || true
          if [ ! -f /tmp/marker-python-setup-exfil ]; then
            echo "::warning::pip refused the sdist — this is BETTER than documented. Tighten README."
            # Don't fail; better-than-expected behavior shouldn't break CI
            exit 0
          fi
          echo "✓ documented limit confirmed: pip only-binary does not protect against local-file sdist installs"
          rm -f /tmp/marker-python-setup-exfil
          python3 -m pip uninstall -y --break-system-packages test-setup-exfil 2>/dev/null || true

  action-blocks-real-npm-package:
    name: 'Action: blocks real npm package install script (bcrypt native bindings)'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'

      - uses: ./action
        with:
          ecosystems: npm

      # bcrypt@5.1.1 (released 2023) has an `install` lifecycle script that
      # uses node-pre-gyp to fetch prebuilt native bindings — without that
      # script running, the .node addon file is never on disk, and require()
      # fails. This is a real package from npm (not a controlled fixture).
      # Old enough to clear the 48h age gate by years.
      - name: Install bcrypt — install script must be blocked
        run: |
          mkdir -p /tmp/bcrypt-real && cd /tmp/bcrypt-real
          npm init -y >/dev/null
          npm install bcrypt@5.1.1 2>&1 | tail -3 || true
          # Package downloaded?
          if [ ! -f node_modules/bcrypt/package.json ]; then
            echo "::error::bcrypt failed to download — test inconclusive (network or registry issue)"
            exit 2
          fi
          # Native bindings should NOT be present (install script blocked)
          if node -e "require('bcrypt')" 2>/dev/null; then
            echo "::error::bcrypt loaded successfully — install script RAN despite ignore-scripts"
            exit 1
          fi
          echo "✓ bcrypt downloaded but native bindings absent (install script blocked)"

  action-external-reference:
    name: 'Action: works when consumed by external ref (uses owner/repo/path@branch)'
    runs-on: ubuntu-24.04
    steps:
      # Deliberately NO `actions/checkout` of this repo — proves the action
      # resolves and runs purely via GitHub Actions runtime, which is what a
      # consumer in a separate repo experiences.
      - uses: echennells/supply-chain-hardening/action@feat/github-action
        id: harden

      - name: Outputs are populated (same as local-checkout test)
        run: |
          test -n "${{ steps.harden.outputs.ecosystems-hardened }}"
          test "${{ steps.harden.outputs.release-age-hours }}" = "48"
          echo "ecosystems=${{ steps.harden.outputs.ecosystems-hardened }}"

      - name: Env vars propagated
        run: |
          test "$NPM_CONFIG_IGNORE_SCRIPTS" = "true"
          test "$PIP_DISABLE_PIP_VERSION_CHECK" = "1"

      - name: Config files written
        run: |
          grep -q "ignore-scripts=true" "$HOME/.npmrc"
          grep -q "ignoreScripts: true" "$HOME/.config/pnpm/config.yaml"
